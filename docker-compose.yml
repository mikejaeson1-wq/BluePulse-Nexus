services:
  postgres:
    image: postgres:16-alpine
    container_name: bluepulse-nexus-postgres

    restart: unless-stopped

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bluepulse_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-bluepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluepulse_dev_change_me}

    volumes:
      - bluepulse_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bluepulse} -d ${POSTGRES_DB:-bluepulse_nexus}"
        ]

      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  bluepulse_postgres_data:
    name: bluepulse-nexus-postgres-data