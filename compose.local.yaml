name: ${COMPOSE_PROJECT_NAME:-bluepulse-nexus}

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bluepulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - bluepulse_backend

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://127.0.0.1:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      MEDIA_STORAGE_DIR: /app/apps/api/storage/media
      AUTH_COOKIE_SECURE: "false"
    volumes:
      - bluepulse_media_data:/app/apps/api/storage/media
    depends_on:
      database:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - 'fetch("http://127.0.0.1:3001/api/ready").then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - bluepulse_backend

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1/
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - bluepulse_backend

networks:
  bluepulse_backend:
    driver: bridge

volumes:
  bluepulse_postgres_data:
  bluepulse_media_data:
