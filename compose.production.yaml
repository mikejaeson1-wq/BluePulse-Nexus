name: ${COMPOSE_PROJECT_NAME:-bluepulse-nexus-production}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB fehlt}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER fehlt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt}
    volumes:
      - bluepulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - bluepulse_backend

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL fehlt}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      MEDIA_STORAGE_DIR: /app/apps/api/storage/media
      AUTH_REQUIRED: "true"
      AUTH_COOKIE_SECURE: "true"
    volumes:
      - bluepulse_media_data:/app/apps/api/storage/media
    depends_on:
      database:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - 'fetch("http://127.0.0.1:3001/api/ready").then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - bluepulse_edge
      - bluepulse_backend

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?SITE_DOMAIN fehlt}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL fehlt}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - bluepulse_caddy_data:/data
      - bluepulse_caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://127.0.0.1:2015/health
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - bluepulse_edge

networks:
  bluepulse_edge:
    driver: bridge
  bluepulse_backend:
    driver: bridge
    internal: true

volumes:
  bluepulse_postgres_data:
  bluepulse_media_data:
  bluepulse_caddy_data:
  bluepulse_caddy_config:
